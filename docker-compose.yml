# docker-compose.yml
version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: blog-api-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: spike
      MONGO_INITDB_ROOT_PASSWORD: 2049
      MONGO_INITDB_DATABASE: blog-api
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data: